<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WebMovies – Descubra e avalie os melhores filmes com design Neumórfico." />
  <title>WebMovies</title>

  <!-- Preconnect para fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <!-- Estilos (ordem importa) -->
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/themes.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="dark-theme">

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="wm-header" role="banner">

    <a href="/" class="wm-logo" aria-label="WebMovies – página inicial">
      <span>Web</span><span>Movies</span>
    </a>

    <label class="wm-search-wrap" for="wm-search">
      <!-- ícone lupa -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="wm-search"
        class="wm-search"
        type="search"
        placeholder="Buscar filmes, séries, atores…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Buscar conteúdo"
      />
    </label>

    <button type="button" class="wm-theme-btn" aria-label="Alternar tema claro/escuro">
      <!-- SVG injetado pelo theme.js -->
    </button>

  </header>


  <!-- ══════════════════════════════════════════
       HERO
  ══════════════════════════════════════════ -->
  <section class="wm-hero" aria-label="Filme em destaque">
    <img class="wm-hero__bg" src="" alt="" aria-hidden="true" />

    <div class="wm-hero__content">
      <span class="wm-hero__kicker">EM DESTAQUE</span>

      <h1 class="wm-hero__title">Carregando…</h1>

      <p class="wm-hero__synopsis"></p>

      <div class="wm-hero__actions">
        <button type="button" class="wm-btn wm-btn--watch" aria-label="Assistir agora">
          <!-- play icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="18" height="18" aria-hidden="true">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          ASSISTIR AGORA
        </button>

        <button type="button" class="wm-btn wm-btn--rate" aria-label="Avaliar filme">
          <!-- star icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="18" height="18" aria-hidden="true">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02
                              12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          AVALIAR
        </button>

        <button type="button" class="wm-btn wm-btn--ghost" aria-label="Ver mais informações">
          SAIBA MAIS
        </button>
      </div>
    </div>
  </section>


  <!-- ══════════════════════════════════════════
       CONTEÚDO PRINCIPAL
  ══════════════════════════════════════════ -->
  <main class="wm-main" id="main-content">

    <!-- Populares -->
    <section class="wm-section" aria-labelledby="section-popular">
      <div class="wm-section__header">
        <h2 class="wm-section__title" id="section-popular">
          POPULARES NO <span>TMDB</span>
        </h2>
      </div>
      <div
        class="wm-grid"
        data-grid="popular"
        aria-live="polite"
        aria-label="Lista de filmes populares"
      ></div>
    </section>

    <!-- Em alta essa semana -->
    <section class="wm-section" aria-labelledby="section-trending">
      <div class="wm-section__header">
        <h2 class="wm-section__title" id="section-trending">
          EM ALTA <span>ESSA SEMANA</span>
        </h2>
      </div>
      <div
        class="wm-grid"
        data-grid="recommended"
        aria-live="polite"
        aria-label="Lista de filmes em alta"
      ></div>
    </section>

  </main>


  <!-- ══════════════════════════════════════════
       TOAST (criado/gerenciado via JS)
  ══════════════════════════════════════════ -->
  <div id="wm-toast" class="wm-toast" role="status" aria-live="assertive" aria-atomic="true"></div>


  <!-- ══════════════════════════════════════════
       SCRIPTS
       type="module" ativa ES Modules nativos;
       o navegador ignora em caso de ausência
  ══════════════════════════════════════════ -->
  <script type="module" src="assets/js/app.js"></script>

</body>
</html>
